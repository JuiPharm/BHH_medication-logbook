<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จ่ายยา - สมุดยาฝาก</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar navbar-dark" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
    <div class="container">
      <span class="navbar-brand fw-bold">💊 จ่ายยา / หักลบจำนวน</span>
      <a href="index.html" class="btn btn-light btn-sm fw-bold">← กลับหน้าหลัก</a>
    </div>
  </nav>

  <div class="container mt-4 mb-5">
    <div id="medicineInfo" class="card shadow-lg border-0 mb-4">
      <div class="card-body text-center p-5">
        <div class="spinner-border text-primary"></div>
        <p class="mt-3">กำลังโหลดข้อมูลยา...</p>
      </div>
    </div>

    <div class="card shadow-lg border-0">
      <div class="card-header bg-warning text-dark fw-bold">✏️ ระบุรายละเอียดการจ่าย</div>
      <div class="card-body p-4">
        <form id="dispenseForm" onsubmit="submitDispense(event)">
          <input type="hidden" id="medicineId">
          <input type="hidden" id="hn">
          <input type="hidden" id="drugNameHidden">

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">จำนวนที่จ่าย <span class="text-danger">*</span></label>
              <div class="input-group">
                <input type="number" id="dispenseQty" class="form-control form-control-lg" required min="0.5" step="0.5">
                <span class="input-group-text" id="unitLabel">Vial</span>
              </div>
              <small class="text-muted">จำนวนคงเหลือ: <span id="remainingHint">-</span></small>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">ผู้จ่าย <span class="text-danger">*</span></label>
              <input type="text" id="dispensedBy" class="form-control form-control-lg" required>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">ผู้รับ</label>
              <input type="text" id="receiver" class="form-control">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">Ward / จุดรับยา</label>
              <input type="text" id="ward" class="form-control">
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-bold">หมายเหตุ</label>
            <textarea id="dispenseNotes" class="form-control" rows="2"></textarea>
          </div>

          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-warning btn-lg fw-bold">✅ ยืนยันการจ่ายยา</button>
            <a href="index.html" class="btn btn-outline-secondary">ยกเลิก</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="toast-header"><strong class="me-auto" id="toastTitle">แจ้งเตือน</strong><button type="button" class="btn-close" data-bs-dismiss="toast"></button></div>
      <div class="toast-body" id="toastMessage"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const medId = new URLSearchParams(window.location.search).get('id');
      if (medId) loadMedicineForDispense(medId);
      else document.getElementById('medicineInfo').innerHTML = '<div class="alert alert-danger">❌ ไม่พบรหัสยา</div>';
    });
  </script>
</body>
</html>
