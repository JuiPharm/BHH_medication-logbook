<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เพิ่มยาฝาก - OCR</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
  <nav class="navbar navbar-dark" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);">
    <div class="container">
      <span class="navbar-brand fw-bold">➕ เพิ่มยาฝากใหม่ + OCR</span>
      <a href="index.html" class="btn btn-light btn-sm fw-bold">← กลับหน้าหลัก</a>
    </div>
  </nav>

  <div class="container mt-4 mb-5">
    <div class="card shadow-lg border-0 mb-4">
      <div class="card-header text-white fw-bold" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
        📷 สแกนฉลากยา / ใบสั่งยาด้วย OCR
      </div>
      <div class="card-body p-4">
        <div class="row g-2 align-items-center">
          <div class="col-md-8">
            <input type="file" id="ocrImage" accept="image/*" class="form-control form-control-lg" onchange="processOCR(this)">
            <small class="text-muted">รองรับ JPG/PNG ขนาดไม่เกิน 8MB ระบบจะกรอกข้อมูลอัตโนมัติ แต่ต้องตรวจทานก่อนบันทึก</small>
          </div>
          <div class="col-md-4">
            <button class="btn btn-outline-secondary w-100" onclick="document.getElementById('ocrImage').click()">📁 เลือกรูปภาพ</button>
          </div>
        </div>

        <div id="ocrProgress" class="mt-3 d-none">
          <div class="progress" style="height: 25px;">
            <div class="progress-bar progress-bar-striped progress-bar-animated bg-info" id="progressBar" style="width: 0%"></div>
          </div>
          <div class="text-center mt-2"><span class="badge bg-info" id="ocrStatus">กำลังประมวลผล...</span></div>
        </div>
        <div id="ocrPreview" class="mt-3"></div>
      </div>
    </div>

    <div class="card shadow-lg border-0">
      <div class="card-header bg-light fw-bold">📝 ข้อมูลยาฝาก</div>
      <div class="card-body p-4">
        <form id="addForm" onsubmit="submitMedicine(event)">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">HN <span class="text-danger">*</span></label>
              <input type="text" id="hn" class="form-control" placeholder="07-13-000025" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">ชื่อผู้ป่วย <span class="text-danger">*</span></label>
              <input type="text" id="patientName" class="form-control" placeholder="นาย/นาง/นางสาว ..." required>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">ชื่อยา <span class="text-danger">*</span></label>
              <input type="text" id="drugName" class="form-control" placeholder="Espogen / Hema Plus / Ceftriaxone" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">ชื่อสามัญ</label>
              <input type="text" id="genericName" class="form-control" placeholder="epoetin alfa">
            </div>
          </div>

          <div class="row">
            <div class="col-md-3 mb-3">
              <label class="form-label fw-bold">ความแรง</label>
              <input type="text" id="strength" class="form-control" placeholder="4000 IU / 500 mg">
            </div>
            <div class="col-md-3 mb-3">
              <label class="form-label fw-bold">รูปแบบ</label>
              <select id="form" class="form-select">
                <option value="Vial">Vial</option><option value="Ampoule">Ampoule</option><option value="Syringe">Syringe</option>
                <option value="Tablet">Tablet</option><option value="Capsule">Capsule</option><option value="Bottle">Bottle</option><option value="Other">Other</option>
              </select>
            </div>
            <div class="col-md-3 mb-3">
              <label class="form-label fw-bold">จำนวนรวม <span class="text-danger">*</span></label>
              <input type="number" id="totalQty" class="form-control" required min="0.5" step="0.5">
            </div>
            <div class="col-md-3 mb-3">
              <label class="form-label fw-bold">หน่วย</label>
              <select id="unit" class="form-select">
                <option value="Vial">Vial</option><option value="Ampoule">Ampoule</option><option value="Syringe">Syringe</option>
                <option value="Tablet">Tablet</option><option value="Capsule">Capsule</option><option value="Bottle">Bottle</option><option value="Box">Box</option>
              </select>
            </div>
          </div>

          <div class="row">
            <div class="col-md-4 mb-3"><label class="form-label fw-bold">การเก็บรักษา</label><input type="text" id="storage" class="form-control" placeholder="2-8°C / ตู้เย็น"></div>
            <div class="col-md-4 mb-3"><label class="form-label fw-bold">โรงพยาบาล</label><input type="text" id="hospital" class="form-control" value="Bangkok Hospital"></div>
            <div class="col-md-4 mb-3"><label class="form-label fw-bold">PN</label><input type="text" id="pn" class="form-control" placeholder="O2603300492"></div>
          </div>

          <div class="row">
            <div class="col-md-4 mb-3"><label class="form-label fw-bold">วันที่รับยา <span class="text-danger">*</span></label><input type="date" id="entryDate" class="form-control" required></div>
            <div class="col-md-4 mb-3"><label class="form-label fw-bold">Follow up / วันนัด</label><input type="date" id="followUpDate" class="form-control"></div>
            <div class="col-md-4 mb-3"><label class="form-label fw-bold">วันหมดอายุ</label><input type="date" id="expiryDate" class="form-control"></div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">วิธีใช้ / ตารางบริหารยา</label>
            <input type="text" id="administrationSchedule" class="form-control" placeholder="เช่น ฉีด SC ครั้งละ 4,000 ยูนิต ทุก 10 วัน">
          </div>

          <div class="row">
            <div class="col-md-6 mb-3"><label class="form-label fw-bold">Image URL</label><input type="url" id="imageUrl" class="form-control" placeholder="ลิงก์รูปภาพ ถ้ามี"></div>
            <div class="col-md-6 mb-3"><label class="form-label fw-bold">ผู้บันทึก</label><input type="text" id="createdBy" class="form-control" placeholder="ชื่อผู้บันทึก"></div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">หมายเหตุ</label>
            <textarea id="notes" class="form-control" rows="3" placeholder="รายละเอียดเพิ่มเติม"></textarea>
          </div>

          <div class="mb-4">
            <label class="form-label fw-bold">OCR Raw Text</label>
            <textarea id="ocrRawText" class="form-control" rows="4" placeholder="ข้อความ OCR ดิบจะมาแสดงตรงนี้"></textarea>
          </div>

          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-success btn-lg fw-bold">💾 บันทึกยาฝาก</button>
            <a href="index.html" class="btn btn-outline-secondary">ยกเลิก</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="toast-header"><strong class="me-auto" id="toastTitle">แจ้งเตือน</strong><button type="button" class="btn-close" data-bs-dismiss="toast"></button></div>
      <div class="toast-body" id="toastMessage"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/ocr.js"></script>
</body>
</html>
