<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สมุดยาฝาก - ค้นหา</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar navbar-dark" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
    <div class="container">
      <span class="navbar-brand fw-bold">🏥 สมุดยาฝาก (Medication Logbook)</span>
      <div class="d-flex gap-2">
        <a href="history.html" class="btn btn-outline-light btn-sm fw-bold">📜 ประวัติ</a>
        <a href="add-medicine.html" class="btn btn-light btn-sm fw-bold">➕ เพิ่มยาใหม่</a>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <div class="alert alert-info border-0 shadow-sm">
      ค้นหาด้วย HN ได้ทั้งรูปแบบมีขีดและไม่มีขีด เช่น <strong>07-13-000025</strong> หรือ <strong>0713000025</strong>
    </div>

    <div class="card shadow-lg border-0">
      <div class="card-body p-4">
        <h4 class="card-title text-primary mb-3">🔍 ค้นหาด้วย HN</h4>
        <div class="input-group input-group-lg">
          <span class="input-group-text bg-primary text-white">HN</span>
          <input type="text" id="searchHN" class="form-control" autofocus>
          <button class="btn btn-primary fw-bold" onclick="searchMedicine()">ค้นหา</button>
          <button class="btn btn-outline-secondary" onclick="loadAllActive()">แสดงทั้งหมด</button>
        </div>
      </div>
    </div>

    <div id="loading" class="text-center mt-5 d-none">
      <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;"></div>
      <p class="mt-3 text-muted">กำลังโหลดข้อมูล...</p>
    </div>

    <div id="results" class="mt-4"></div>
  </div>

  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="toast-header">
        <strong class="me-auto" id="toastTitle">แจ้งเตือน</strong>
        <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
      </div>
      <div class="toast-body" id="toastMessage"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
