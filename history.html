<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ประวัติการจ่ายยา</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="https://lh5.googleusercontent.com/d/1r7PM1ogHIbxskvcauVIYaQOfSHXWGncO">
  <link rel="shortcut icon" href="https://lh5.googleusercontent.com/d/1r7PM1ogHIbxskvcauVIYaQOfSHXWGncO">
  <link rel="apple-touch-icon" href="https://lh5.googleusercontent.com/d/1r7PM1ogHIbxskvcauVIYaQOfSHXWGncO">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar navbar-dark" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);">
    <div class="container">
      <span class="navbar-brand fw-bold"><img src="https://lh5.googleusercontent.com/d/1r7PM1ogHIbxskvcauVIYaQOfSHXWGncO" alt="Logo" class="app-logo"> <span>ประวัติการจ่ายยา</span></span>
      <a href="index.html" class="btn btn-light btn-sm fw-bold">← กลับหน้าหลัก</a>
    </div>
  </nav>

  <div class="container mt-4 mb-5">
    <div class="card shadow-lg border-0">
      <div class="card-body p-4">
        <h4 class="mb-4">🔍 ค้นหาประวัติการจ่ายยา</h4>
        <div class="input-group input-group-lg mb-4">
          <span class="input-group-text bg-info text-white">HN</span>
          <input type="text" id="historyHN" class="form-control" inputmode="numeric" pattern="07-[0-9]{2}-[0-9]{6}">
          <button class="btn btn-info text-white fw-bold" onclick="loadHistory()">ค้นหา</button>
        </div>
        <div id="historyResults"></div>
      </div>
    </div>
  </div>

  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="toast-header"><strong class="me-auto" id="toastTitle">แจ้งเตือน</strong><button type="button" class="btn-close" data-bs-dismiss="toast"></button></div>
      <div class="toast-body" id="toastMessage"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.log('SW Error:', err));
      });
    }
  </script>
</body>
</html>
